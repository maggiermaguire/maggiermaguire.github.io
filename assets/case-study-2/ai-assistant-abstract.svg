  <circle cx="644" cy="150" r="46" fill="none" stroke="#F5F1E8" stroke-opacity="0.1" stroke-width="14"/>
  <circle cx="644" cy="150" r="46" fill="none" stroke="#C1653D" stroke-width="14" stroke-dasharray="130 300" stroke-linecap="round" transform="rotate(-90 644 150)"/>

