  <rect x="24" y="70" width="62" height="7" rx="3" fill="#F5F1E8" fill-opacity="0.16"/>
  <rect x="24" y="91" width="54" height="7" rx="3" fill="#F5F1E8" fill-opacity="0.08"/>
  <rect x="24" y="112" width="58" height="7" rx="3" fill="#F5F1E8" fill-opacity="0.08"/>
  <rect x="24" y="133" width="48" height="7" rx="3" fill="#F5F1E8" fill-opacity="0.08"/>
  <rect x="24" y="154" width="52" height="7" rx="3" fill="#F5F1E8" fill-opacity="0.08"/>

