    </filter>
    <filter id="composerShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="800" height="500" rx="16" fill="#16233F"/>

  <!-- navbar -->
