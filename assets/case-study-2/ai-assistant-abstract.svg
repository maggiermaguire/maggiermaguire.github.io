    <path d="M330 278a8 8 0 0 1 8-8h336a8 8 0 0 1 8 8v28h-352z" fill="#D7DCE6"/>
    <rect x="346" y="288" width="10" height="10" rx="2" fill="#16233F" fill-opacity="0.35"/>
    <rect x="364" y="290" width="80" height="7" rx="3" fill="#16233F" fill-opacity="0.35"/>
    <circle cx="648" cy="293" r="4" fill="#B9C1D0"/>
    <circle cx="664" cy="293" r="4" fill="#B9C1D0"/>
    <circle cx="680" cy="293" r="4" fill="#B9C1D0"/>

