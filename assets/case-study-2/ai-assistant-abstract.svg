    <rect x="654" y="352" width="62" height="16" rx="8" fill="#E9F1FB" stroke="#85B7EB" stroke-width="1.5"/>

    <rect x="580" y="382" width="164" height="52" rx="6" fill="none" stroke="#E5DFD2" stroke-width="1.5"/>
    <rect x="590" y="392" width="140" height="6" rx="3" fill="#E5DFD2"/>
    <rect x="590" y="404" width="115" height="6" rx="3" fill="#E5DFD2"/>
    <rect x="590" y="416" width="90" height="6" rx="3" fill="#E5DFD2"/>

