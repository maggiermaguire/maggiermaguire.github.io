  <rect x="158" y="100" width="140" height="6" rx="3" fill="#F5F1E8" fill-opacity="0.1"/>
  <rect x="158" y="116" width="120" height="6" rx="3" fill="#F5F1E8" fill-opacity="0.1"/>
  <rect x="158" y="132" width="130" height="6" rx="3" fill="#F5F1E8" fill-opacity="0.1"/>

  <rect x="346" y="60" width="190" height="180" rx="8" fill="#F5F1E8" fill-opacity="0.06"/>
  <rect x="364" y="78" width="100" height="8" rx="3" fill="#F5F1E8" fill-opacity="0.18"/>
  <rect x="364" y="98" width="70" height="16" rx="3" fill="#F5F1E8" fill-opacity="0.14"/>
