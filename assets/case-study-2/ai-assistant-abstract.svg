    <rect x="386" y="323" width="220" height="7" rx="2" fill="#D7DCE6"/>
    <rect x="346" y="346" width="30" height="6" rx="2" fill="#AEB6C4"/>
    <rect x="386" y="345" width="150" height="7" rx="2" fill="#D7DCE6"/>

    <rect x="346" y="368" width="14" height="14" rx="3" fill="#D7DCE6"/>
