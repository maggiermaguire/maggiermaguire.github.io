  <g filter="url(#panelShadow)">
    <rect x="564" y="320" width="196" height="150" rx="10" fill="#FAF8F3" stroke="#C1653D" stroke-width="4"/>
    <path d="M582 334l2.4 6 6 2.4-6 2.4-2.4 6-2.4-6-6-2.4 6-2.4z" fill="#C1653D"/>
    <rect x="600" y="336" width="68" height="8" rx="3" fill="#16233F" fill-opacity="0.8"/>
    <circle cx="748" cy="340" r="5" fill="#D8CFBC"/>

